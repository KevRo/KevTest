<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Products')}"></head>
<body>
    <header th:replace="~{fragments :: header}"></header>

    <div class="container">
        <main role="main" class="pb-3">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                <h1 class="mb-0">Products</h1>
                <a class="btn btn-primary" th:href="@{/products/new}">Add Product</a>
            </div>

            <div class="alert alert-warning" role="alert" th:if="${apiError}" th:text="${apiError}"></div>

            <p class="text-muted" th:if="${apiError == null and #lists.isEmpty(products)}">No products yet.</p>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"
                 th:if="${apiError == null and not #lists.isEmpty(products)}">
                <div class="col" th:each="product : ${products}">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title text-break" th:text="${product.name()}">Name</h5>
                            <p class="card-text fs-5"
                               th:text="${'$' + #numbers.formatDecimal(product.price(), 1, 2)}">$0.00</p>
                        </div>
                        <div class="card-footer bg-transparent border-top-0">
                            <form th:action="@{/products/{id}/delete(id=${product.id()})}" method="post"
                                  th:attr="data-name=${product.name()}"
                                  onsubmit="return confirm('Delete ' + this.dataset.name + '?');">
                                <button type="submit" class="btn btn-outline-danger btn-sm w-100">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/site.js}"></script>
</body>
</html>
