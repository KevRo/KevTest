<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Product')}"></head>
<body>
    <header th:replace="~{fragments :: header}"></header>

    <div class="container">
        <main role="main" class="pb-3">
            <h1>Add Product</h1>

            <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

            <div class="row">
                <div class="col-12 col-md-8 col-lg-6">
                    <form th:action="@{/products}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="name">Name</label>
                            <input class="form-control" id="name" name="name" th:value="${name}" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="price">Price</label>
                            <input class="form-control" id="price" name="price" type="number" step="0.01" min="0"
                                   th:value="${price}" />
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a class="btn btn-secondary" th:href="@{/products}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/site.js}"></script>
</body>
</html>
